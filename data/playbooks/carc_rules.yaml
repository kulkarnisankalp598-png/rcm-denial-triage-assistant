# CARC-based denial rules playbook
# Each rule defines a deterministic recommended action for a specific CARC code
# Action categories: resubmit, correct_claim, add_documentation, appeal, bill_patient, human_review
# Source: CMS, X12, and standard RCM billing practices

rules:
  - carc: "16"
    short_name: "Missing Information"
    action_category: "correct_claim"
    group_codes: ["CO", "PR", "OA"]
    recommended_action: "Review the remittance advice remark code (RARC) to identify the specific missing element. Correct the identified field in your billing system and resubmit as a corrected claim (frequency code 7) within 180 days of the remittance date."
    appeal_eligible: true
    priority: "HIGH"
    common_rarcs: ["MA130", "MA61", "M51"]
    notes: "Check modifier completeness, procedure code validity, and NPI accuracy before resubmitting."

  - carc: "50"
    short_name: "Not Medically Necessary"
    action_category: "appeal"
    group_codes: ["CO"]
    recommended_action: "Obtain a letter of medical necessity from the treating physician. Gather supporting clinical documentation including diagnosis, prior treatment attempts, and objective findings. Submit an appeal with clinical notes and applicable peer-reviewed guidelines within 180 days."
    appeal_eligible: true
    priority: "HIGH"
    common_rarcs: ["N20", "N130"]
    notes: "Check if prior authorization was required and not obtained. If so, address the authorization gap before appealing."

  - carc: "97"
    short_name: "Service Bundled"
    action_category: "correct_claim"
    group_codes: ["CO"]
    recommended_action: "Verify the procedure code combination against current NCCI edits. If the services are distinct and separately identifiable, resubmit with modifier 59 or an appropriate X modifier (XE, XS, XP, XU) with supporting documentation. Do not rebill without a modifier if the NCCI edit applies."
    appeal_eligible: true
    priority: "MEDIUM"
    common_rarcs: ["M15"]
    notes: "Review whether the services were performed at different anatomical sites, during different sessions, or by different providers."

  - carc: "1"
    short_name: "Deductible Amount"
    action_category: "bill_patient"
    group_codes: ["PR"]
    recommended_action: "Bill the patient directly for the deductible amount shown. This is the patient's financial responsibility under their benefit plan. Do not write off the amount unless required by a specific contractual or hardship agreement."
    appeal_eligible: false
    priority: "LOW"
    common_rarcs: ["N4"]
    notes: "Verify the patient's deductible balance before billing. Confirm group code is PR — if CO, the provider may not be able to collect."

  - carc: "4"
    short_name: "Inconsistent Modifier"
    action_category: "correct_claim"
    group_codes: ["CO"]
    recommended_action: "Review whether the modifier appended is appropriate for the procedure code billed. If modifier 25 was used, confirm that separate and significant E/M documentation exists in the medical record. Correct the modifier and resubmit, or submit an appeal with the complete medical record for the date of service."
    appeal_eligible: true
    priority: "HIGH"
    common_rarcs: ["N130", "N166"]
    notes: "Modifier 25 requires separate E/M documentation that is distinct from the procedure note. If documentation does not support a separate E/M, do not resubmit with modifier 25."

  - carc: "96"
    short_name: "Non-Covered Charge"
    action_category: "human_review"
    group_codes: ["CO"]
    recommended_action: "Verify that the service is not excluded under the patient's benefit plan. If the service is covered under a different benefit category, recode and resubmit. If the service is truly non-covered, inform the patient and issue an Advance Beneficiary Notice (ABN) for future services of this type. Do not write off without confirming the denial reason."
    appeal_eligible: true
    priority: "MEDIUM"
    common_rarcs: ["N180", "N425"]
    notes: "Review the patient's benefit plan for exclusions. Some services denied as non-covered under one code may be covered under a different procedure or diagnosis code."

  - carc: "18"
    short_name: "Duplicate Claim"
    action_category: "resubmit"
    group_codes: ["CO"]
    recommended_action: "Check claim status in the provider portal before resubmitting. If the original claim is still in process, wait for adjudication. If a correction is needed, submit a corrected claim (frequency code 7) referencing the original claim number, not a new original claim."
    appeal_eligible: false
    priority: "LOW"
    common_rarcs: []
    notes: "Do not resubmit a claim showing as received or in process. Use frequency code 8 to void and refile if the original claim had errors."

  - carc: "29"
    short_name: "Timely Filing"
    action_category: "appeal"
    group_codes: ["CO"]
    recommended_action: "Gather proof of timely filing — original submission confirmation, clearinghouse reports, or payer acknowledgment. Submit an appeal with the timely filing documentation within the payer's appeal window. If the claim was submitted on time but rejected, include the original submission date and reference number."
    appeal_eligible: true
    priority: "MEDIUM"
    common_rarcs: []
    notes: "Most payers require claims within 90-365 days of the date of service. Timely filing denials are difficult to overturn without documented proof of original submission."

  - carc: "45"
    short_name: "Exceeds Fee Schedule"
    action_category: "correct_claim"
    group_codes: ["CO"]
    recommended_action: "Write off the contractual adjustment — this is the difference between your billed charge and the payer's contracted rate. Do not bill the patient for CO-45 amounts as this violates most payer contracts. Review your fee schedule to ensure charges align with contracted rates."
    appeal_eligible: false
    priority: "LOW"
    common_rarcs: []
    notes: "CO-45 is a contractual obligation write-off, not a true denial. No action required beyond posting the adjustment."

  - carc: "197"
    short_name: "Missing Authorization"
    action_category: "add_documentation"
    group_codes: ["CO"]
    recommended_action: "Verify whether prior authorization was required for this service. If authorization was obtained but not included on the claim, resubmit with the authorization number in the appropriate field. If authorization was not obtained, submit a retro-authorization request to the payer and appeal if approved."
    appeal_eligible: true
    priority: "HIGH"
    common_rarcs: ["N3", "N4"]
    notes: "Some payers accept retro-authorization requests for emergent or urgent services. Check payer-specific policies before assuming the denial is final."